# Keeps the delay data fresh on two channels:
#
# `data` release (regional bulk, for offline use in the app):
#   meta.json    tiny descriptor the app checks first
#   history.zip  monthly base for STATIONS, rebuilt when a month publishes
#   recent.zip   daily overlay for STATIONS
#
# Per-shard branches (country-wide, fetched train-by-train on demand):
#   shards          base shards, force-pushed when the base is rebuilt
#   shards-recent   small recent-day overlays, force-pushed daily
#
# Per-day condensed parquet (country-wide) is cached, so a daily run only
# processes newly published raw days.
name: Update delay data

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      rebuild_base:
        description: "Force rebuilding the monthly base"
        type: boolean
        default: false

permissions:
  contents: write

env:
  # Bulk-zip station set — Bavaria/Schwaben hubs + neighbours. The
  # per-shard branches are built without a station filter (country-wide).
  STATIONS: "8000013,8000261,8000262,8000284,8000096,8000309,8000170,8000260,8000183,8000002,8000057,8000078,8003693,8000249,8000122,8000197"
  HF: https://huggingface.co/datasets/piebro/deutsche-bahn-data/resolve/main

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline dependencies
        run: pip install "polars>=1.0"

      - name: Restore per-day cache
        uses: actions/cache@v4
        with:
          path: pipeline/recent-cache
          key: recent-cache-all-${{ github.run_id }}
          restore-keys: recent-cache-all-

      - name: Determine coverage
        id: coverage
        run: |
          # Newest published monthly file, probing backwards from last month.
          for i in 1 2 3; do
            month=$(date -d "$(date +%Y-%m-15) -$i month" +%Y-%m)
            if curl -fsIL "$HF/monthly_processed_data/data-$month.parquet" >/dev/null; then
              echo "newest_month=$month" >> "$GITHUB_OUTPUT"
              echo "newest published month: $month"
              break
            fi
          done

      - name: Build missing recent days (country-wide)
        run: |
          mkdir -p pipeline/recent-cache
          newest="${{ steps.coverage.outputs.newest_month }}"
          start=$(date -d "${newest}-15 +1 month" +%Y-%m-01)
          yesterday=$(date -d yesterday +%Y-%m-%d)
          # Drop cached days a monthly file now covers.
          for f in pipeline/recent-cache/data-recent-*.parquet; do
            [ -e "$f" ] || continue
            d=$(basename "$f" .parquet); d=${d#data-recent-}
            [ "$d" \< "$start" ] && { echo "pruning $d (covered by $newest)"; rm "$f"; }
          done
          day="$start"
          while [ "$day" \< "$yesterday" ] || [ "$day" = "$yesterday" ]; do
            out="pipeline/recent-cache/data-recent-$day.parquet"
            if [ ! -f "$out" ]; then
              y=$(date -d "$day" +%Y); m=$(date -d "$day" +%-m); dd=$(date -d "$day" +%-d)
              mkdir -p raw && ok=1
              for h in 00_01_02_03_04_05 06_07_08_09_10_11 12_13_14_15_16_17 18_19_20_21_22_23; do
                url="$HF/raw_data/year%3D$y/month%3D$m/day%3D$dd/hour_$h.parquet"
                curl -fsSL --retry 3 -o "raw/hour_$h.parquet" "$url" || { ok=0; break; }
              done
              if [ "$ok" = 1 ]; then
                python pipeline/build_recent.py --date "$day" --raw-dir raw --out "$out"
              else
                echo "skipping $day (raw files not fully published)"
              fi
              rm -rf raw
            fi
            day=$(date -d "$day +1 day" +%Y-%m-%d)
          done
          ls pipeline/recent-cache/

      - name: Build recent sets
        run: |
          mkdir -p pipeline/recent-out
          if ! ls pipeline/recent-cache/data-recent-*.parquet >/dev/null 2>&1; then
            echo "no recent days available yet"
            echo '{}' > pipeline/recent-out/meta.json
            exit 0
          fi
          # Regional bulk zip for the data release.
          python pipeline/build_shards.py \
            --data-dir pipeline/recent-cache --out-dir pipeline/recent-out \
            --stations "$STATIONS"
          mv pipeline/recent-out/history.zip pipeline/recent-out/recent.zip
          # Country-wide per-shard overlays for the shards-recent branch.
          python pipeline/build_shards.py \
            --data-dir pipeline/recent-cache --out-dir pipeline/recent-wide \
            --buckets 4

      - name: Rebuild monthly base
        run: |
          # Rebuild only when a new month was published (or forced).
          newest="${{ steps.coverage.outputs.newest_month }}"
          GH_TOKEN="${{ github.token }}" gh release download data -p history.zip -O /tmp/base.zip -R "$GITHUB_REPOSITORY" || true
          have=$( [ -f /tmp/base.zip ] && unzip -p /tmp/base.zip meta.json | python -c "import json,sys;m=json.load(sys.stdin);print(m['months'][-1], ','.join(m.get('stations',[])))" || echo none)
          force="${{ github.event.inputs.rebuild_base }}"
          if [ "$have" = "$newest $STATIONS" ] && [ "$force" != "true" ]; then
            echo "base up to date (through $have)"; exit 0
          fi
          # 4 months of base: with the 30-day recency half-life, older runs
          # carry <10% weight — not worth the download size.
          mkdir -p pipeline/data
          got=0
          for i in $(seq 1 5); do
            month=$(date -d "$(date +%Y-%m-15) -$i month" +%Y-%m)
            url="$HF/monthly_processed_data/data-$month.parquet"
            if curl -fsSL --retry 3 -o "pipeline/data/data-$month.parquet" "$url"; then
              got=$((got + 1)); echo "downloaded $month"
            fi
            [ "$got" -ge 4 ] && break
          done
          [ "$got" -ge 3 ] || { echo "only $got months available"; exit 1; }
          # Regional bulk zip for the data release.
          python pipeline/build_shards.py \
            --data-dir pipeline/data --out-dir pipeline/output --stations "$STATIONS"
          # Country-wide base for the shards branch, in bounded-memory passes.
          python pipeline/build_shards.py \
            --data-dir pipeline/data --out-dir pipeline/output-wide --buckets 16
          echo "BASE_REBUILT=1" >> "$GITHUB_ENV"

      - name: Compose meta.json and upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-assets
          if [ "${BASE_REBUILT:-0}" = 1 ]; then
            base_meta=pipeline/output/meta.json
          else
            gh release download data -p history.zip -O /tmp/base.zip --clobber -R "$GITHUB_REPOSITORY"
            unzip -o -d /tmp /tmp/base.zip meta.json && base_meta=/tmp/meta.json
          fi
          python -c "$(printf '%s\n' \
            'import json, sys' \
            'base = json.load(open(sys.argv[1]))' \
            'recent = json.load(open(sys.argv[2]))' \
            'for key in ("recent_from", "recent_through"):' \
            '    if key in recent:' \
            '        base[key] = recent[key]' \
            'json.dump(base, open("release-assets/meta.json", "w"))' \
          )" "$base_meta" pipeline/recent-out/meta.json
          cat release-assets/meta.json
          if [ -f pipeline/recent-out/recent.zip ]; then
            cp pipeline/recent-out/recent.zip release-assets/
          fi
          if [ "${BASE_REBUILT:-0}" = 1 ]; then
            cp pipeline/output/history.zip release-assets/
          fi
          gh release upload data release-assets/* --clobber -R "$GITHUB_REPOSITORY"

      - name: Publish country-wide per-shard branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          push_branch() {
            local dir=$1 branch=$2
            [ -d "$dir" ] || { echo "$dir missing, skipping $branch"; return; }
            cp "$dir/../meta.json" "$dir/meta.json" 2>/dev/null || true
            git -C "$dir" init -q -b "$branch"
            git -C "$dir" config user.email "actions@github.com"
            git -C "$dir" config user.name "github-actions"
            git -C "$dir" add -A
            git -C "$dir" commit -qm "$branch $(date -u +%F)"
            git -C "$dir" push -qf \
              "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$branch"
            echo "pushed $branch"
          }
          push_branch pipeline/recent-wide/shards shards-recent
          if [ "${BASE_REBUILT:-0}" = 1 ]; then
            push_branch pipeline/output-wide/shards shards
          fi
